# Dataset Generation Configuration
# This config controls which countries to process and how many samples to generate

# Countries to include in relation building
# Use ISO 3166-1 alpha-2 codes, or "all" to include every country
countries:
  - all
  # Or specify a subset:
  # - IN   # India
  # - PK   # Pakistan
  # - EC   # Ecuador
  # - BE   # Belgium
  # - KE   # Kenya

# Sample generation targets per family
# Relation limits are auto-calculated from these targets.
# Targets below are tuned to current template counts so heavily expanded
# families still get reasonable per-template coverage after uniform
# distribution across template_id and train/val/test splitting.
sample_targets:
  direct_lookup:      1000   # 2 templates
  disambiguation:     2000   # 3 templates
  adjacency:          3600   # 12 templates; includes admin↔NE and NE↔admin variants
  multi_adjacency:    1200   # 3 templates
  containment:        2500   # 5 templates; includes NE-anchor variants
  intersection:       2400   # 6 templates; includes same-source and NE-anchor variants
  buffer:             2200   # 11 templates; single-anchor, subtype-filtered, multi-anchor, NE
  chained:            2800   # 13 templates; county/region/country coastal, inland, river, mountain
  difference:         1800   # 2 templates, one mixed-source
  border_corridor:    1500   # 1 template
  set_operations:     2400   # 6 templates; unions and multi-country subtype retrieval
  partial_selection:  2000   # 5 templates, one mixed-source
  aggregation:        1600   # 4 templates
  window_function:    1600   # 4 templates
  attribute_filter:   1600   # 4 templates

# Generation settings
generation:
  max_workers: 8           # Number of parallel workers
  retry_multiplier: 2      # Generate 2x samples to account for failures
  append_mode: false       # Set false for clean regeneration after template/format changes

# Auto-scaling configuration
# Relation limits are automatically calculated: target * retry_multiplier * safety_factor
auto_scaling:
  safety_factor: 1.5       # Extra buffer to ensure enough unique pairs
  
  # Manual overrides (optional) - uncomment to override auto-calculated limits
  manual_limits: {}
    # adjacency: 10000     # Uncomment to manually set
    # containment: 2000
    # intersection: 1000
    # cross_source: 500
  
# Modal configuration for distributed generation
modal:
  volume_name: "gazet-data"         # Modal Volume for parquet data
  app_name: "gazet-dataset"         # Modal app name
  num_containers: 100               # Number of parallel containers for sample generation
  container_cpu: 2                  # CPUs per container
  container_memory: 4096            # Memory (MB) per container
  timeout: 7200                     # Per-container timeout in seconds

# Run name — used to version exported splits so re-runs never overwrite previous data.
# Change this whenever you regenerate from scratch (e.g. after template changes).
# Exported files land in: output/runs/{run_name}/
run_name: "v4"
